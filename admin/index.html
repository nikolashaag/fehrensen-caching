<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Inhalte bearbeiten</title>
<style>
:root{--cream:#F6F3EC;--paper:#fff;--ink:#222C25;--muted:#5C6258;--clay:#B07C66;--clay-deep:#8C604E;--line:rgba(34,44,37,.16)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--cream);color:var(--ink);line-height:1.5}
header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:.9rem clamp(1rem,4vw,2rem);background:rgba(246,243,236,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
header h1{font-size:1.05rem;font-weight:600}
header .who{font-size:.82rem;color:var(--muted)}
header a.logout{font-size:.82rem;color:var(--clay-deep);text-decoration:none;font-weight:600}
main{max-width:760px;margin:0 auto;padding:clamp(1.2rem,4vw,2.4rem) clamp(1rem,4vw,2rem) 6rem}
.group{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:1.2rem 1.3rem;margin-bottom:1.2rem}
.group > h2{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--clay-deep);font-weight:700;margin-bottom:1rem}
.field{margin-bottom:1rem}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.35rem}
.field input[type=text],.field textarea{width:100%;font:inherit;font-size:.95rem;color:var(--ink);background:var(--cream);
  border:1px solid var(--line);border-radius:9px;padding:.6em .8em;outline:none}
.field textarea{min-height:96px;resize:vertical;line-height:1.5}
.field input:focus,.field textarea:focus{border-color:var(--clay)}
.imgrow{display:flex;gap:1rem;align-items:center}
.imgrow img{width:120px;height:78px;object-fit:cover;border-radius:8px;border:1px solid var(--line);background:var(--cream)}
.imgrow .pick{font-size:.85rem}
.bar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:.8rem clamp(1rem,4vw,2rem);background:rgba(246,243,236,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
.bar .status{font-size:.85rem;color:var(--muted)}
button.save{font:inherit;font-weight:600;font-size:.92rem;color:#fff;background:var(--clay);border:none;border-radius:100px;padding:.7em 1.6em;cursor:pointer}
button.save:hover{background:var(--clay-deep)}
button.save:disabled{opacity:.55;cursor:default}
.note{max-width:760px;margin:0 auto;padding:0 clamp(1rem,4vw,2rem);color:var(--muted);font-size:.85rem}
.loading{padding:3rem;text-align:center;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:84px;transform:translate(-50%,16px);background:#3a6b53;color:#fff;
  padding:.85em 1.4em;border-radius:10px;font-size:.92rem;font-weight:500;line-height:1.4;text-align:center;
  box-shadow:0 14px 34px -12px rgba(0,0,0,.45);opacity:0;pointer-events:none;max-width:90vw;z-index:30;
  transition:opacity .3s ease,transform .3s ease}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<header>
  <h1 id="title">Inhalte bearbeiten</h1>
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="who" id="who"></span>
    <a class="logout" href="/cdn-cgi/access/logout">Abmelden</a>
  </div>
</header>
<main>
  <div id="form"><p class="loading">Lädt …</p></div>
</main>
<div class="bar">
  <span class="status" id="status">Änderungen werden als Commit gespeichert und die Website neu veröffentlicht.</span>
  <button class="save" id="save" disabled>Speichern &amp; veröffentlichen</button>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script type="module" src="./cms.js"></script>
</body>
</html>
